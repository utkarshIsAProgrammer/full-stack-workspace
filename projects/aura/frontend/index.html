<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500;600;700;800&family=Raleway:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Primary Meta Tags -->
    <title>Aura — A peaceful space for teams</title>
    <meta name="title" content="Aura — Peaceful Team Communication" />
    <meta
      name="description"
      content="A serene space for your team to connect, collaborate, and create together. Real-time messaging, video calls, and more."
    />
    <meta name="keywords" content="team communication, messaging, collaboration, video calls, peaceful" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aura — Peaceful Team Communication" />
    <meta
      property="og:description"
      content="A serene space for your team to connect, collaborate, and create together."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Aura — Peaceful Team Communication" />
    <meta
      property="twitter:description"
      content="A serene space for your team to connect, collaborate, and create together."
    />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#1A1B2F" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
